{% extends "base.html" %}
{% block title %}Quiz App{% endblock %}
{% block content %}
        <h1 class="text-center mb-4">Quiz App</h1>
        <form action="{{ url_for('start_quiz') }}" method="post">
            <div class="mb-3">
                <label for="quiz_select" class="form-label">Select a Quiz</label>
                <select class="form-select" id="quiz_select" name="quiz_id" required onchange="updateSections()">
                    <option value="">-- Choose a quiz --</option>
                    {% for quiz in quizzes %}
                    <option value="{{ quiz.id }}" data-sections='{{ quiz.sections|tojson }}'>{{ quiz.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div id="section_selection" class="mb-3" style="display: none;">
                <label class="form-label">Select Sections (leave empty for all)</label>
                <div id="section_checkboxes" class="border rounded p-3 bg-body-secondary">
                </div>
                <small class="text-muted">Select specific sections or leave empty to include all questions</small>
            </div>
            
            <div class="mb-3">
                <label for="count" class="form-label">Number of Questions</label>
                <input type="number" class="form-control" id="count" name="count" min="1" placeholder="e.g., 5" required>
            </div>
            <div class="mb-3">
                <label for="timer" class="form-label">Timer (minutes, optional)</label>
                <input type="number" class="form-control" id="timer" name="timer" min="0" placeholder="Leave blank for no timer">
            </div>
            <button type="submit" class="btn btn-primary">Start Quiz</button>
        </form>
        
        <div class="mt-4">
            <a href="{{ url_for('history') }}" class="btn btn-secondary">View Previous Attempts</a>
        </div>
{% endblock %}
{% block scripts %}
    <script>
        function updateSections() {
            const select = document.getElementById('quiz_select');
            const selectedOption = select.options[select.selectedIndex];
            const sectionsDiv = document.getElementById('section_selection');
            const checkboxesDiv = document.getElementById('section_checkboxes');
            
            const sections = JSON.parse(selectedOption.dataset.sections || '[]');
            
            if (sections.length > 0) {
                sectionsDiv.style.display = 'block';
                checkboxesDiv.innerHTML = sections.map(s => 
                    `<div class="form-check">
                        <input class="form-check-input" type="checkbox" name="sections" value="${s.id}" id="section_${s.id}">
                        <label class="form-check-label" for="section_${s.id}">
                            <strong>${s.name}</strong>
                            <small class="text-muted"> - ${s.description}</small>
                        </label>
                    </div>`
                ).join('');
            } else {
                sectionsDiv.style.display = 'none';
                checkboxesDiv.innerHTML = '';
            }
        }
    </script>
{% endblock %}
